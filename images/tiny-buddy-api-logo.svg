<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <defs>
    <!-- Night background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1530"/>
      <stop offset="100%" stop-color="#0f1e48"/>
    </linearGradient>

    <!-- Body warm gradient -->
    <radialGradient id="body" cx="42%" cy="36%" r="62%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="52%" stop-color="#ffb020"/>
      <stop offset="100%" stop-color="#e86e00"/>
    </radialGradient>

    <!-- Ear -->
    <radialGradient id="ear" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffd44a"/>
      <stop offset="100%" stop-color="#e07a00"/>
    </radialGradient>

    <!-- Eye iris -->
    <radialGradient id="iris" cx="32%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#55aaff"/>
      <stop offset="55%" stop-color="#1a38cc"/>
      <stop offset="100%" stop-color="#080828"/>
    </radialGradient>

    <!-- Blush -->
    <radialGradient id="blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaecb" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#ff79a8" stop-opacity="0"/>
    </radialGradient>

    <!-- Belly highlight -->
    <radialGradient id="belly" cx="50%" cy="65%" r="48%">
      <stop offset="0%" stop-color="#fff8dd" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>

    <!-- "Tiny" rainbow -->
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff6eb4"/>
      <stop offset="28%"  stop-color="#ffd454"/>
      <stop offset="56%"  stop-color="#44e8b8"/>
      <stop offset="78%"  stop-color="#55aaff"/>
      <stop offset="100%" stop-color="#cc77ff"/>
    </linearGradient>

    <!-- API badge gradient -->
    <linearGradient id="apiBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3060"/>
      <stop offset="100%" stop-color="#0d1e45"/>
    </linearGradient>

    <!-- Code bracket orange -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="textglow" x="-8%" y="-30%" width="116%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>

    <clipPath id="roundRect">
      <rect width="560" height="200" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="560" height="200" rx="22" fill="url(#bg)"/>

  <!-- Subtle grid lines (code editor feel) -->
  <g opacity=".045" stroke="#6688cc" stroke-width="1">
    <line x1="0" y1="40"  x2="560" y2="40"/>
    <line x1="0" y1="80"  x2="560" y2="80"/>
    <line x1="0" y1="120" x2="560" y2="120"/>
    <line x1="0" y1="160" x2="560" y2="160"/>
    <line x1="80"  y1="0" x2="80"  y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
  </g>

  <!-- ── Decorative code bracket left side ── -->
  <!-- Large { bracket -->
  <text x="14" y="130" font-family="'Courier New', monospace" font-size="120" font-weight="900"
        fill="url(#bracketGrad)" opacity=".09">{</text>

  <!-- Stars / sparkles -->
  <g filter="url(#softglow)">
    <polygon points="500,22 502,28 508,28 503,32 505,38 500,34 495,38 497,32 492,28 498,28"
             fill="#ffe066" opacity=".85"/>
    <polygon points="536,50 537.5,54.5 542,54.5 538.5,57.5 540,62 536,59 532,62 533.5,57.5 530,54.5 534.5,54.5"
             fill="#fff" opacity=".7"/>
    <polygon points="520,78 521,81 524,81 522,83 523,86 520,84 517,86 518,83 516,81 519,81"
             fill="#55aaff" opacity=".65"/>
    <circle cx="545" cy="30" r="2"   fill="#ffe066" opacity=".55"/>
    <circle cx="488" cy="45" r="1.5" fill="#fff"    opacity=".45"/>
    <circle cx="510" cy="62" r="1.5" fill="#cc77ff" opacity=".5"/>
    <circle cx="498" cy="86" r="1"   fill="#44e8b8" opacity=".4"/>
    <circle cx="548" cy="68" r="1.5" fill="#fff"    opacity=".35"/>
    <!-- Left side -->
    <polygon points="22,28 23.5,33 28,33 24.5,36 26,41 22,38 18,41 19.5,36 16,33 20.5,33"
             fill="#ffd454" opacity=".5"/>
    <circle cx="42" cy="52" r="1.5" fill="#fff" opacity=".3"/>
  </g>

  <!-- ═══════════════ MASCOT ═══════════════ -->
  <g transform="translate(96, 100)">

    <!-- Body glow halo -->
    <ellipse cx="0" cy="20" rx="50" ry="44" fill="#ffaa00" opacity=".12" filter="url(#glow)"/>

    <!-- Left ear -->
    <ellipse cx="-30" cy="-44" rx="13" ry="18" fill="url(#ear)" transform="rotate(-14,-30,-44)"/>
    <ellipse cx="-30" cy="-44" rx="7"  ry="10" fill="#ffaac8"   transform="rotate(-14,-30,-44)"/>

    <!-- Right ear -->
    <ellipse cx="30" cy="-46" rx="13" ry="18" fill="url(#ear)" transform="rotate(12,30,-46)"/>
    <ellipse cx="30" cy="-46" rx="7"  ry="10" fill="#ffaac8"   transform="rotate(12,30,-46)"/>

    <!-- Body -->
    <ellipse cx="0" cy="20" rx="46" ry="50" fill="url(#body)"/>
    <ellipse cx="0" cy="26" rx="28" ry="32" fill="url(#belly)"/>

    <!-- Left arm -->
    <ellipse cx="-46" cy="10" rx="12" ry="8.5" fill="#ffcc44" transform="rotate(-28,-46,10)"/>
    <circle  cx="-53" cy="4"  r="7.5" fill="#ffcc44"/>

    <!-- Right arm (raised) -->
    <ellipse cx="46" cy="0" rx="12" ry="8.5" fill="#ffcc44" transform="rotate(22,46,0)"/>
    <circle  cx="54" cy="-8" r="7.5" fill="#ffcc44"/>

    <!-- Feet -->
    <ellipse cx="-22" cy="68" rx="15" ry="9.5" fill="#e07a00"/>
    <ellipse cx=" 22" cy="68" rx="15" ry="9.5" fill="#e07a00"/>

    <!-- ── Eyes ── -->
    <!-- Left -->
    <circle cx="-15" cy="-10" r="14" fill="white"/>
    <circle cx="-14" cy="-9"  r="9.5" fill="url(#iris)"/>
    <circle cx="-14" cy="-9"  r="5.8" fill="#06061e"/>
    <circle cx="-11" cy="-13" r="3"   fill="white" opacity=".95"/>
    <circle cx="-8"  cy="-8"  r="1.3" fill="white" opacity=".55"/>
    <!-- Right -->
    <circle cx="15"  cy="-10" r="14" fill="white"/>
    <circle cx="16"  cy="-9"  r="9.5" fill="url(#iris)"/>
    <circle cx="16"  cy="-9"  r="5.8" fill="#06061e"/>
    <circle cx="19"  cy="-13" r="3"   fill="white" opacity=".95"/>
    <circle cx="22"  cy="-8"  r="1.3" fill="white" opacity=".55"/>

    <!-- Blush -->
    <ellipse cx="-30" cy="5" rx="11" ry="7" fill="url(#blush)"/>
    <ellipse cx=" 30" cy="5" rx="11" ry="7" fill="url(#blush)"/>

    <!-- Nose -->
    <ellipse cx="0" cy="4" rx="4" ry="2.8" fill="#cc5500" opacity=".75"/>

    <!-- Smile -->
    <path d="M-11 14 Q0 25 11 14" stroke="#b84800" stroke-width="2.3" fill="none" stroke-linecap="round"/>

    <!-- Sparkle on raised hand -->
    <g transform="translate(62,-18)" filter="url(#softglow)">
      <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#ffe566" opacity=".95"/>
    </g>
  </g>

  <!-- ═══════════════ TEXT BLOCK ═══════════════ -->

  <!-- "Tiny" — rainbow italic serif -->
  <text x="200" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62" font-weight="900" font-style="italic"
    fill="url(#rainbow)"
    filter="url(#textglow)"
    letter-spacing="-1.5">Tiny</text>

  <!-- "Buddy" — white -->
  <text x="200" y="154"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62" font-weight="900" font-style="italic"
    fill="white" opacity=".97"
    letter-spacing="-1.5">Buddy</text>

  <!-- ── API badge pill ── -->
  <g transform="translate(202, 162)">
    <!-- Pill background -->
    <rect x="0" y="0" width="96" height="26" rx="13"
          fill="url(#apiBadge)"
          stroke="rgba(255,180,50,0.35)" stroke-width="1.2"/>
    <!-- Code brackets -->
    <text x="10" y="18.5"
          font-family="'Courier New', monospace"
          font-size="12" font-weight="700"
          fill="#ffb020">&lt;/&gt;</text>
    <!-- "API" text -->
    <text x="38" y="18.5"
          font-family="'Courier New', monospace"
          font-size="13" font-weight="700"
          fill="#e8f0ff"
          letter-spacing="2.5">API</text>
    <!-- Dot indicator -->
    <circle cx="86" cy="13" r="3.5" fill="#44e8b8" opacity=".9"/>
    <circle cx="86" cy="13" r="5.5" fill="#44e8b8" opacity=".18"/>
  </g>

  <!-- ── Subtle version tag ── -->
  <text x="304" y="186"
    font-family="'Courier New', monospace"
    font-size="9.5"
    fill="#3a5090"
    letter-spacing="1.5">v2.4</text>

</svg>
